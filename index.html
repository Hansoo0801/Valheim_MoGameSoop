<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>발헤임 서버 가이드</title>

<style>
body {
  margin: 0;
  background: #111;
  text-align: center;
}

.page {
  position: relative;
  width: 1280px;
  margin: 40px auto;
}

.page img {
  width: 1280px;
}

/* 🔴 디버그 모드 ON */
.copy-btn {
  position: absolute;
  background: rgba(255,0,0,0.3);
  border: 2px solid red;
  cursor: pointer;
}
</style>
</head>

<body>

<div class="page"><img src="page1.jpg"></div>

<div class="page">
  <img src="page2.jpg">
  <a href="https://thunderstore.io/package/ebkr/r2modman/"
     target="_blank"
     style="position:absolute; left:120px; top:236px; width:1025px; height:40px;">
  </a>
</div>

<div class="page"><img src="page3.jpg"></div>
<div class="page"><img src="page4.jpg"></div>

<div class="page">
  <img src="page5.jpg">
  <button class="copy-btn"
    style="left:730px; top:345px; width:130px; height:24px;"
    onclick="copyCode()">
  </button>
</div>

<div class="page"><img src="page6.jpg"></div>
<div class="page"><img src="page7.jpg"></div>
<div class="page"><img src="page8.jpg"></div>
<div class="page"><img src="page9.jpg"></div>
<div class="page"><img src="page10.jpg"></div>

<div class="page">
  <img src="page11.jpg">
  <button class="copy-btn"
    style="left:400px; top:80px; width:110px; height:23px;"
    onclick="copyIP()">
  </button>
</div>

<script>
function copyCode() {
  navigator.clipboard.writeText("019de11e-7a50-00a6-91e8-5e6e28070d20");
  alert("코드 복사됨");
}

function copyIP() {
  navigator.clipboard.writeText("38.96.30.82:27030");
  alert("IP 복사됨");
}
</script>

</body>
</html>
