<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>발헤임 서버 가이드</title>

<style>
body {
  margin: 0;
  background: #111;
  text-align: center;
}

.page {
  position: relative;
  width: 1280px;
  margin: 40px auto;
}

.page img {
  width: 1280px;
}

.copy-btn {
  position: absolute;
  background: transparent;
  border: none;
  cursor: pointer;
}

/* 💖 토스트 UI */
#toast {
  position: fixed;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%) scale(0.7);
  background: rgba(90, 90, 90, 0.9);
  color: white;
  padding: 40px 80px;
  border-radius: 30px;
  font-size: 36px;
  font-weight: 700;
  letter-spacing: 1px;
  opacity: 0;
  transition: all 0.25s ease;
  pointer-events: none;
  font-family: "Segoe UI Rounded", "Arial Rounded MT Bold", sans-serif;
  box-shadow: 0 10px 40px rgba(0,0,0,0.4);
  backdrop-filter: blur(6px);
}

#toast.show {
  opacity: 1;
  transform: translate(-50%, -50%) scale(1);
}
</style>
</head>

<body>

<div class="page"><img src="page1.jpg"></div>

<div class="page">
  <img src="page2.jpg">
  <!-- ✅ 다운로드 버튼 (토스트 없음, 새창 열기) -->
  <a href="https://thunderstore.io/package/ebkr/r2modman/"
     target="_blank"
     rel="noopener noreferrer"
     class="copy-btn"
     style="position:absolute; left:120px; top:236px; width:1025px; height:40px;">
  </a>
</div>

<div class="page"><img src="page3.jpg"></div>
<div class="page"><img src="page4.jpg"></div>

<div class="page">
  <img src="page5.jpg">
  <!-- ✅ IP 복사 (토스트 유지) -->
  <button class="copy-btn"
    style="left:885px; top:545px; width:170px; height:40px;"
    onclick="copyCode()">
  </button>
</div>
  
<div class="page"><img src="page6.jpg"></div>
<div class="page"><img src="page7.jpg"></div>
<div class="page"><img src="page8.jpg"></div>
<div class="page"><img src="page9.jpg"></div>
<div class="page"><img src="page10.jpg"></div>

<div class="page">
  <img src="page11.jpg">
  <!-- ✅ IP 복사 (토스트 유지) -->
  <button class="copy-btn"
    style="left:480px; top:120px; width:150px; height:40px;"
    onclick="copyIP()">
  </button>
</div>

<!-- 💖 토스트 -->
<div id="toast">Copy</div>

<script>
function showToast(message) {
  const toast = document.getElementById("toast");
  toast.innerText = message;
  toast.classList.add("show");

  setTimeout(() => {
    toast.classList.remove("show");
  }, 2000);
}

function copyCode() {
  navigator.clipboard.writeText("019de11e-7a50-00a6-91e8-5e6e28070d20");
  showToast("코드 복사 완료!");
}

function copyIP() {
  navigator.clipboard.writeText("38.96.30.82:27030");
  showToast("서버 주소 복사 완료!");
}
</script>

</body>
</html>
